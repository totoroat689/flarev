name: Flare(V) 공공 축제 수집

# 매일 오후 7시(한국시간) 실행
on:
  schedule:
    # 한국시간 19:00 = UTC 10:00
    - cron: "0 10 * * *"
  # 손으로 "지금 실행" 버튼 (테스트용)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: 공공 수집기 실행
        env:
          TOURAPI_KEY: ${{ secrets.TOURAPI_KEY }}
        run: python api_collector.py

      - name: KOPIS 공연 수집기 실행
        env:
          KOPIS_KEY: ${{ secrets.KOPIS_KEY }}
        run: python kopis_collector.py
