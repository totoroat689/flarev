name: KOPIS 공연 수집 (백필 - 매일)

on:
  # 매일 밤 10시(한국시간) 자동 실행 = UTC 13:00
  schedule:
    - cron: "0 13 * * *"
  # 손으로 "지금 실행" 버튼도 유지
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v5

      - name: 파이썬 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install -r requirements.txt

      - name: KOPIS 공연 수집기 실행
        env:
          KOPIS_KEY: ${{ secrets.KOPIS_KEY }}
        run: python kopis_collector.py
