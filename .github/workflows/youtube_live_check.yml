# ============================================
# Flare(V) 유튜브 라이브 상태 점검 (자동: 30분마다)
# 위치: .github/workflows/youtube_live_check.yml
# 실행: 30분마다 자동 + Actions 탭에서 "YouTube Live Checker" 수동 실행도 가능
# 필요한 Secrets: GOOGLE_API_KEY (이미 등록돼 있음 — 유튜브 키)
# 메모: 깃허브 스케줄은 UTC 기준이며, 서버가 바쁘면 몇 분 늦게 돌 수 있음(정상).
# ============================================
name: YouTube Live Checker

on:
  schedule:
    - cron: "*/30 * * * *" # 30분마다
  workflow_dispatch: {} # 수동 실행 버튼

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install requests supabase

      - name: 상태 점검 실행
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python youtube_live_checker.py
