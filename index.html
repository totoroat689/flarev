<!DOCTYPE html>
<!-- ============================================
     Flare(V) 홈페이지
     버전: v1.9
     수정일: 2026-06-01
     수정사항:
       - 팝업: 좋아요/별점 제거 → 조명탄 버튼으로 변경
         (누르면 팡 터지고 누적 +1, 여러 번 가능 / 임시 숫자, DB 연동 예정)
       - 팝업 제목 옆 링크(🔗) 아이콘: 누르면 구글에 축제명 검색
       - 팝업 제목 2줄 방지: 길면 글자 크기 자동 축소(한 줄 유지)
       - 모바일 메뉴: 열릴 때 햄버거 버튼도 같이 밀려나가고 ✕로 전환
       - 지도 라벨 글자 제한 180px → 220px
       - 로고 조명탄 효과: (V) 은은한 호흡 글로우 +
         15초마다 조명탄 수직 발사 → 노란 불빛 하나가 천천히 낙하
     ============================================ -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flare(V) — 기쁨을 발견하고 순간을 공유하다</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --sidebar: #10101a;
        --panel: #14141f;
        --border: rgba(255, 255, 255, 0.07);
        --text: #f0f0f5;
        --muted: #6b6b80;
        --festival: #ff6b6b;
        --discount: #ffd93d;
        --live: #6bffb8;
        --festival-bg: rgba(255, 107, 107, 0.12);
        --discount-bg: rgba(255, 217, 61, 0.12);
        --live-bg: rgba(107, 255, 184, 0.12);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Noto Sans KR', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
      }

      /* ── SIDEBAR ── */
      #sidebar {
        width: 280px;
        min-width: 280px;
        background: var(--sidebar);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        z-index: 100;
        position: relative;
        overflow-y: auto;
        transition: transform 0.3s ease;
      }

      .logo-wrap {
        padding: 28px 24px 20px;
        border-bottom: 1px solid var(--border);
        position: relative;
        overflow: hidden;
      }

      .logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2rem;
        letter-spacing: 3px;
        line-height: 1;
        position: relative;
        display: inline-block;
        z-index: 2;
      }

      /* (V) 은은한 호흡 글로우 */
      .logo span {
        color: var(--festival);
        animation: logo-breath 3.5s ease-in-out infinite;
      }
      @keyframes logo-breath {
        0%, 100% {
          text-shadow: 0 0 10px rgba(255, 107, 107, 0.55);
        }
        50% {
          text-shadow: 0 0 22px rgba(255, 107, 107, 1),
            0 0 38px rgba(255, 107, 107, 0.6);
        }
      }

      /* 조명탄: (V) 오른쪽에서 수직으로 발사 → 정점에서 사라짐 (15초마다) */
      .logo-flare {
        position: absolute;
        left: 96px;
        top: 46px;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #ffb3a0;
        box-shadow: 0 0 10px #ff6b6b, 0 0 18px #ff6b6b;
        opacity: 0;
        z-index: 1;
        animation: logo-launch 15s ease-out infinite;
      }
      @keyframes logo-launch {
        0% { transform: translateY(0) scale(1); opacity: 0; }
        2% { opacity: 1; }
        7% { transform: translateY(-32px) scale(0.7); opacity: 1; }
        9% { transform: translateY(-38px) scale(1.6); opacity: 0.5; }
        10% { transform: translateY(-40px) scale(0.2); opacity: 0; }
        100% { transform: translateY(-40px) scale(0.2); opacity: 0; }
      }

      /* 터진 뒤 노란 불빛 하나가 곧게 천천히 낙하 */
      .logo-light {
        position: absolute;
        left: 98px;
        top: 6px;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #ffe88a;
        box-shadow: 0 0 14px #ffd93d, 0 0 26px rgba(255, 217, 61, 0.7);
        opacity: 0;
        z-index: 1;
        animation: logo-fall 15s ease-in infinite;
      }
      @keyframes logo-fall {
        0%, 9% { opacity: 0; transform: translateY(0) scale(0.4); }
        11% { opacity: 1; transform: translateY(0) scale(1.3); }
        14% { opacity: 1; transform: translateY(4px) scale(1); }
        30% { opacity: 0.85; transform: translateY(40px) scale(0.85); }
        34% { opacity: 0; transform: translateY(48px) scale(0.5); }
        100% { opacity: 0; transform: translateY(48px) scale(0.5); }
      }

      .logo-sub {
        font-size: 0.68rem;
        color: var(--muted);
        letter-spacing: 1.5px;
        margin-top: 4px;
        text-transform: uppercase;
        position: relative;
        z-index: 2;
      }

      .section {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
      }

      .section-label {
        font-size: 0.65rem;
        letter-spacing: 2px;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      /* 날짜 버튼 (4개: 오늘/이번주/이번달/직접입력) - 한 줄 배치 */
      .date-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
      }

      .date-btn {
        padding: 8px 2px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 0.66rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        word-break: keep-all;
      }

      .date-btn.active {
        background: var(--festival-bg);
        border-color: var(--festival);
        color: var(--festival);
      }

      .date-btn:hover:not(.active) {
        border-color: rgba(255, 255, 255, 0.2);
        color: var(--text);
      }

      /* 기간 설정 (달력) - 평소엔 숨김, '직접 입력' 누르면 뿅 / 좌우 2칸 */
      .date-range {
        margin-top: 10px;
        display: none;
        gap: 8px;
      }

      .date-range.show {
        display: flex;
        animation: range-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .range-col {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 4px;
        min-width: 0;
      }

      @keyframes range-pop {
        0% {
          opacity: 0;
          transform: translateY(-8px) scale(0.97);
        }
        100% {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .date-range .range-label {
        font-size: 0.62rem;
        color: var(--muted);
      }

      .date-range input[type='date'] {
        width: 100%;
        padding: 7px 8px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        font-size: 0.66rem;
        font-family: 'Noto Sans KR', sans-serif;
        color-scheme: dark; /* 달력 팝업도 다크로 */
        min-width: 0;
      }

      .date-range input[type='date']:focus {
        outline: none;
        border-color: var(--festival);
      }

      /* 미정 축제 보기 토글 */
      .unknown-toggle {
        margin-top: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 0.76rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        width: 100%;
        text-align: left;
      }

      .unknown-toggle .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #888;
        flex-shrink: 0;
      }

      .unknown-toggle.active {
        background: rgba(150, 150, 150, 0.15);
        border-color: #999;
        color: var(--text);
      }

      /* 카테고리 필터 */
      .filter-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .filter-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }

      .filter-item.active-festival {
        background: var(--festival-bg);
        border-color: rgba(255, 107, 107, 0.3);
      }

      .filter-item.active-discount {
        background: var(--discount-bg);
        border-color: rgba(255, 217, 61, 0.3);
      }

      .filter-item.active-live {
        background: var(--live-bg);
        border-color: rgba(107, 255, 184, 0.3);
      }

      .filter-item:not(.active-festival):not(.active-discount):not(
          .active-live
        ):hover {
        background: rgba(255, 255, 255, 0.04);
      }

      .filter-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .dot-festival {
        background: var(--festival);
        box-shadow: 0 0 8px rgba(255, 107, 107, 0.8);
      }
      .dot-discount {
        background: var(--discount);
        box-shadow: 0 0 8px rgba(255, 217, 61, 0.8);
      }
      .dot-live {
        background: var(--live);
        box-shadow: 0 0 8px rgba(107, 255, 184, 0.8);
      }

      .filter-text {
        flex: 1;
        font-size: 0.82rem;
        font-weight: 500;
      }
      .filter-count {
        font-size: 0.7rem;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.06);
        padding: 2px 8px;
        border-radius: 20px;
      }

      .login-wrap {
        margin-top: auto;
        padding: 20px 24px;
        border-top: 1px solid var(--border);
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        font-size: 0.82rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.25s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .login-btn:hover {
        background: rgba(255, 107, 107, 0.1);
        border-color: var(--festival);
        color: var(--festival);
      }

      /* ── 햄버거 메뉴 버튼 (모바일 전용) ── */
      #menu-toggle {
        position: absolute;
        top: 16px;
        left: 16px;
        width: 44px;
        height: 44px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(20, 20, 31, 0.85);
        backdrop-filter: blur(10px);
        color: var(--text);
        font-size: 1.2rem;
        cursor: pointer;
        z-index: 400;
        display: none; /* PC에선 숨김 */
        align-items: center;
        justify-content: center;
        transition: transform 0.3s ease; /* 메뉴 따라 부드럽게 이동 */
      }

      /* 사이드바 바깥 어두운 배경 (모바일에서 열렸을 때) */
      #sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 90;
        display: none;
      }
      #sidebar-overlay.show {
        display: block;
      }

      /* ── MAP AREA ── */
      #map-container {
        flex: 1;
        position: relative;
      }

      #map {
        width: 100%;
        height: 100%;
        background: #0d1117;
      }

      /* ── 커스텀 축제 핀 ── */
      .flare-pin {
        position: relative;
        cursor: pointer;
      }

      .flare-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffb3a0, #ff6b8b);
        box-shadow: 0 0 10px rgba(255, 107, 139, 0.9),
          0 0 20px rgba(255, 107, 139, 0.5);
        position: relative;
        animation: dot-pulse 2.5s ease-in-out infinite;
      }

      .flare-dot::after {
        content: '';
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 1px solid rgba(255, 107, 139, 0.5);
        animation: ring-pulse 2.5s ease-in-out infinite;
      }

      /* 날짜 미확인 핀 (회색) */
      .flare-pin.unknown .flare-dot {
        background: radial-gradient(circle at 35% 35%, #c8c8d0, #888);
        box-shadow: 0 0 10px rgba(150, 150, 160, 0.8),
          0 0 20px rgba(150, 150, 160, 0.4);
      }
      .flare-pin.unknown .flare-dot::after {
        border-color: rgba(160, 160, 170, 0.5);
      }
      .flare-pin.unknown .flare-label {
        border-color: rgba(160, 160, 170, 0.55);
      }

      /* 진행 중 축제 핀 (빛 강하게 + 크게) */
      .flare-pin.ongoing .flare-dot {
        width: 18px;
        height: 18px;
        margin: -2px; /* 14→18px 커진 만큼 중심 보정 */
        background: radial-gradient(circle at 35% 35%, #ffd9cc, #ff5577);
        box-shadow: 0 0 16px rgba(255, 90, 120, 1),
          0 0 30px rgba(255, 90, 120, 0.7),
          0 0 44px rgba(255, 90, 120, 0.4);
      }
      .flare-pin.ongoing .flare-dot::after {
        inset: -8px;
        border-color: rgba(255, 90, 120, 0.7);
      }
      .flare-pin.ongoing {
        z-index: 996;
      }

      /* NOW 뱃지 (진행 중 표시) */
      .now-badge {
        position: absolute;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: #ff5577;
        color: #fff;
        font-size: 0.56rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        padding: 2px 7px;
        border-radius: 20px;
        white-space: nowrap;
        box-shadow: 0 2px 8px rgba(255, 90, 120, 0.6);
        pointer-events: none;
      }

      /* 이름표를 왼쪽으로 빼는 경우 (흩어질 때 왼쪽 핀) */
      .flare-pin.label-left .flare-label {
        left: auto;
        right: 20px;
        transform: translateY(-50%) translateX(6px) scale(0.9);
      }
      .flare-pin.label-left.spider .flare-label,
      .flare-pin.label-left.zoomed .flare-label,
      .flare-pin.label-left:hover .flare-label {
        transform: translateY(-50%) translateX(0) scale(1);
      }

      /* 선택된(팝업 열린) 핀 → 노란색 */
      .flare-pin.selected .flare-dot {
        background: radial-gradient(circle at 35% 35%, #fff4b0, #ffd93d);
        box-shadow: 0 0 12px rgba(255, 217, 61, 0.95),
          0 0 22px rgba(255, 217, 61, 0.5);
      }
      .flare-pin.selected .flare-dot::after {
        border-color: rgba(255, 217, 61, 0.6);
      }
      .flare-pin.selected .flare-label {
        border-color: rgba(255, 217, 61, 0.7);
      }
      .flare-pin.selected {
        z-index: 998 !important;
      }

      /* 흩어진(스파이더) 핀: 이름표 항상 보이기 */
      .flare-pin.spider {
        z-index: 997 !important;
      }
      .flare-pin.spider .flare-label {
        opacity: 1;
        transform: translateY(-50%) translateX(0) scale(1);
      }

      /* 숫자 뭉치 마커 */
      .flare-cluster {
        position: absolute;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffb3a0, #ff6b8b);
        box-shadow: 0 0 12px rgba(255, 107, 139, 0.85),
          0 0 22px rgba(255, 107, 139, 0.45);
        border: 2px solid rgba(255, 255, 255, 0.3);
        color: #fff;
        font-weight: 700;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        will-change: transform;
      }

      @keyframes dot-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15); }
      }

      @keyframes ring-pulse {
        0% { transform: scale(0.8); opacity: 0.8; }
        70% { transform: scale(1.8); opacity: 0; }
        100% { opacity: 0; }
      }

      .flare-label {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%) translateX(-6px) scale(0.9);
        font-size: 0.74rem;
        font-weight: 700;
        color: #fff;
        white-space: nowrap;
        padding: 4px 11px;
        border-radius: 20px;
        background: rgba(20, 20, 31, 0.82);
        border: 1px solid rgba(255, 107, 139, 0.55);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5),
          0 0 14px rgba(255, 107, 139, 0.25);
        backdrop-filter: blur(8px);
        letter-spacing: 0.3px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease,
          transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .flare-pin.zoomed .flare-label {
        opacity: 1;
        transform: translateY(-50%) translateX(0) scale(1);
      }

      .flare-pin:hover {
        z-index: 999 !important;
      }
      .flare-pin:hover .flare-dot {
        transform: scale(1.3);
      }
      .flare-pin:hover .flare-label {
        opacity: 1;
        transform: translateY(-50%) translateX(0) scale(1.05);
        border-color: var(--festival);
      }

      /* ── INFO PANEL ── */
      #info-panel {
        position: absolute;
        right: 24px;
        top: 24px;
        width: 320px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        z-index: 200;
        display: none;
        backdrop-filter: blur(20px);
        transform-origin: top right;
      }

      /* 팝업 등장 애니메이션 (슉 튀어나오기) */
      #info-panel.show {
        display: block;
        animation: panel-pop 0.4s cubic-bezier(0.34, 1.8, 0.5, 1);
      }

      @keyframes panel-pop {
        0% {
          transform: scale(0.5) translate(40px, -30px);
          opacity: 0;
        }
        60% {
          transform: scale(1.04) translate(0, 0);
          opacity: 1;
        }
        100% {
          transform: scale(1) translate(0, 0);
        }
      }

      .panel-header {
        padding: 16px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }

      .panel-badge {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        padding: 4px 10px;
        border-radius: 20px;
        text-transform: uppercase;
      }

      .badge-festival {
        background: var(--festival-bg);
        color: var(--festival);
        border: 1px solid rgba(255, 107, 107, 0.3);
      }

      .panel-close {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 1.2rem;
        line-height: 1;
        padding: 2px 6px;
        border-radius: 6px;
        transition: all 0.2s;
      }

      .panel-close:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .panel-img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
      }

      .panel-body {
        padding: 16px 18px;
      }

      /* 제목 + 링크 아이콘 한 줄 */
      .panel-title-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
      }

      .panel-title {
        font-size: 1rem;
        font-weight: 700;
        line-height: 1.3;
        color: #fff;
        /* 2줄 방지: 한 줄로 유지하고 넘치면 ... (JS가 글자크기 먼저 줄임) */
        flex: 1;
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* 제목 옆 구글 검색 링크 버튼 */
      .title-link-btn {
        flex-shrink: 0;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 0.85rem;
        padding: 2px 4px;
        border-radius: 6px;
        opacity: 0.6;
        transition: all 0.2s;
        line-height: 1;
      }
      .title-link-btn:hover {
        opacity: 1;

      // ── 지도 초기화 ──
      function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {

      // ── 핀·뭉치 클래스 정의 (google.maps 로드된 뒤 실행) ──

        // 화면 픽셀 좌표 계산용 도우미 (뭉치 거리 계산에 사용)
        class ProjectionHelper extends google.maps.OverlayView {
          onAdd() {}
          draw() {}
          onRemove() {}
          px(latLng) {
            const proj = this.getProjection();
            return proj ? proj.fromLatLngToContainerPixel(latLng) : null;
          }

        projectionHelper = new ProjectionHelper();
        projectionHelper.setMap(map);

              festival.latitude,
              festival.longitude
            );
            this.div = null;
            this.isUnknown = !festival.date_start; // 날짜 미확인 여부
            this.isOngoing = isOngoingFestival(festival); // 진행 중 여부
            this.passesFilter = true; // 필터 통과 여부
            this.spiderOffset = null; // 흩어질 때 위치 보정값
          }

          onAdd() {
            const div = document.createElement('div');
            div.className =
              'flare-pin' +
              (this.isUnknown ? ' unknown' : '') +
              (this.isOngoing ? ' ongoing' : '');
            div.style.position = 'absolute';
            div.style.willChange = 'transform';
            div.innerHTML =
              '<div class="flare-dot"></div>' +
              (this.isOngoing ? '<div class="now-badge">NOW</div>' : '') +
              '<div class="flare-label">' +
              (this.festival.title || '축제') +
              '</div>';

            const self = this;
            div.addEventListener('click', (e) => {
              e.stopPropagation();
              selectPin(self); // 노란색으로 표시
              openFestivalPanel(self.festival);
            });

            this.div = div;
            this.getPanes().overlayMouseTarget.appendChild(div);
          }

          draw() {
            if (!this.div) return;
            const point = this.getProjection().fromLatLngToDivPixel(
              this.position
            );
            if (point) {
              let x = point.x - 7;
              let y = point.y - 7;
              if (this.spiderOffset) {
                x += this.spiderOffset.dx;
                y += this.spiderOffset.dy;
              }
              this.div.style.transform = 'translate(' + x + 'px,' + y + 'px)';
            }
          }

          setZoomed(isZoomed) {
            if (!this.div) return;
            this.div.classList.toggle('zoomed', isZoomed);
          }

          // 화면에 보일지 숨길지
          setVisible(visible) {
            if (!this.div) return;
            this.div.style.display = visible ? 'block' : 'none';
          }

          // 선택(팝업 열림) → 노란색
          setSelected(isSel) {
            if (!this.div) return;
            this.div.classList.toggle('selected', isSel);
          }

          // 흩어지기: offset 있으면 펼침, null이면 제자리
          // offset.labelLeft 가 true면 이름표를 왼쪽으로 뺌
          setSpider(offset) {
            this.spiderOffset = offset;
            if (this.div) {
              this.div.classList.toggle('spider', !!offset);
              this.div.classList.toggle(
                'label-left',
                !!(offset && offset.labelLeft)
              );
            }
            this.draw();
          }

          onRemove() {
            if (this.div) {
              this.div.parentNode.removeChild(this.div);
              this.div = null;
            }
          }
        };

        // 숫자 뭉치 마커
        ClusterMarkerClass = class extends google.maps.OverlayView {
          constructor(position, members) {
            super();
            this.position = position; // 뭉치 중심 좌표
            this.members = members; // 이 뭉치에 속한 핀들
            this.div = null;
          }
          onAdd() {
            const div = document.createElement('div');
            div.className = 'flare-cluster';
            div.style.willChange = 'transform';
            div.textContent = this.members.length;
            const self = this;
            div.addEventListener('click', (e) => {
              e.stopPropagation();
              expandCluster(self); // 누르면 이름 흩뿌리기
            });
            this.div = div;
            this.getPanes().overlayMouseTarget.appendChild(div);
          }
          draw() {
            if (!this.div) return;
            const p = this.getProjection().fromLatLngToDivPixel(this.position);
            if (p) {
              this.div.style.transform =
                'translate(' + (p.x - 18) + 'px,' + (p.y - 18) + 'px)';
            }
          }
          hide() {
            if (this.div) this.div.style.display = 'none';
          }
          show() {
            if (this.div) this.div.style.display = 'flex';
          }
          onRemove() {
            if (this.div) {
              this.div.parentNode.removeChild(this.div);
              this.div = null;
            }
          }
        };
      }

      // ── 데이터 가져오기 ──
      async function loadFestivals() {
        document.getElementById('loading').style.display = 'block';

        const { data, error } = await supabaseClient
          .from('festivals')
          .select('*')
          .eq('is_active', true);

        document.getElementById('loading').style.display = 'none';

        if (error) {
          console.log('❌ 에러:', error.message);
          return;
        }

        festivalData = data;
        console.log('✅ 축제', data.length, '개 불러옴');
        document.getElementById('cnt-festival').textContent = data.length;

        if (map) showFestivalPins();
      }

      // ── 핀 표시 ──
      function showFestivalPins() {
        festivalData.forEach((f) => {
          if (!f.latitude || !f.longitude) return;
          const pin = new FlarePinClass(f);
          pin.setMap(map);
          pinOverlays.push(pin);
        });

        updatePinLabels();
        applyFilters(); // 초기 필터 + 뭉치 계산
      }

      function updatePinLabels() {
        const zoomedIn = map.getZoom() >= LABEL_ZOOM;
        pinOverlays.forEach((pin) => pin.setZoomed(zoomedIn));
      }

      // ── 뭉치 계산: 가까운 핀끼리 묶어서 숫자로 ──
      function recluster() {
        if (!projectionHelper || !projectionHelper.getProjection()) return;

        // 흩어진 상태가 있으면 먼저 제자리로
        if (expandedCluster) {
          expandedCluster.members.forEach((p) => p.setSpider(null));
          expandedCluster = null;
        }
        // 기존 숫자 뭉치 제거
        clusterMarkers.forEach((c) => c.setMap(null));
        clusterMarkers = [];

        // 필터 통과한 핀들의 화면 좌표 모으기
        const pts = [];
        pinOverlays.forEach((pin) => {
          if (!pin.passesFilter) return;
          const px = projectionHelper.px(pin.position);
          if (px) pts.push({ pin: pin, px: px });
        });

        // 가까운 것끼리 그룹화
        const used = new Set();
        for (let i = 0; i < pts.length; i++) {
          if (used.has(i)) continue;
          const group = [pts[i]];
          used.add(i);
          for (let j = i + 1; j < pts.length; j++) {
            if (used.has(j)) continue;
            const dx = pts[i].px.x - pts[j].px.x;
            const dy = pts[i].px.y - pts[j].px.y;
            if (Math.hypot(dx, dy) < CLUSTER_RADIUS) {
              group.push(pts[j]);
              used.add(j);
            }
          }

          if (group.length === 1) {
            // 혼자면 그냥 핀 표시
            group[0].pin.setVisible(true);
          } else {
            // 여러 개면 핀 숨기고 숫자 뭉치 생성
            let latSum = 0;
            let lngSum = 0;
            group.forEach((o) => {
              o.pin.setVisible(false);
              latSum += o.pin.position.lat();
              lngSum += o.pin.position.lng();
            });
            const center = new google.maps.LatLng(
              latSum / group.length,
              lngSum / group.length
            );
            const cm = new ClusterMarkerClass(
              center,
              group.map((o) => o.pin)
            );
            cm.setMap(map);
            clusterMarkers.push(cm);
          }
        }
      }

      // ── 뭉치 펼치기: 이름을 겹치지 않게 흩뿌리기 ──
      // 2개=좌우, 3개=삼각형, 그 이상=다각형(골고루)
      function expandCluster(cm) {
        // 다른 뭉치가 펼쳐져 있으면 먼저 접기
        if (expandedCluster) collapseSpider();

        expandedCluster = cm;
        cm.hide(); // 숫자 숨김

        const n = cm.members.length;
        // 개수 많을수록 넓게 (이름표가 안 겹치게 충분히)
        const radius = 46 + n * 10;

        // 시작 각도: 2개는 좌우(수평), 그 외는 위에서 시작
        // 수평선에 정확히 겹치지 않도록 살짝 기울임
        let startAngle;
        if (n === 2) {
          startAngle = 0; // 0도(오른쪽) / 180도(왼쪽) → 좌우 배치
        } else if (n === 3) {
          startAngle = -Math.PI / 2; // 위 꼭짓점부터 → 삼각형
        } else {
          startAngle = -Math.PI / 2 + Math.PI / n; // 다각형, 살짝 회전
        }

        cm.members.forEach((pin, idx) => {
          const angle = startAngle + (2 * Math.PI * idx) / n;
          const dx = Math.cos(angle) * radius;
          const dy = Math.sin(angle) * radius;
          // 핀이 중심보다 왼쪽에 놓이면 이름표를 왼쪽으로 빼기
          const labelLeft = dx < -2;
          pin.setVisible(true);
          pin.setSpider({ dx: dx, dy: dy, labelLeft: labelLeft });
        });
      }

      // ── 흩어진 이름 다시 합치기 ──
      function collapseSpider() {
        if (!expandedCluster) return;
        expandedCluster.members.forEach((pin) => {
          pin.setSpider(null);
          pin.setVisible(false); // 다시 뭉치 속으로
        });
        expandedCluster.show(); // 숫자 다시 보이기
        expandedCluster = null;
      }

      // ── 날짜 비교 도우미 ──
      function toDate(str) {
        if (!str) return null;
        return new Date(str + 'T00:00:00');
      }

      // 축제가 현재 날짜 필터에 맞는지
      function matchesDateFilter(f) {
        // 날짜 없는 축제는 별도 토글로 관리
        if (!f.date_start) return false;

        const start = toDate(f.date_start);
        const end = toDate(f.date_end) || start;

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        let from, to;

        if (dateFilter === 'today') {
          from = new Date(today);
          to = new Date(today);
        } else if (dateFilter === 'week') {
          from = new Date(today);
          to = new Date(today);
          to.setDate(to.getDate() + 7);
        } else if (dateFilter === 'month') {
          from = new Date(today);
          to = new Date(today);
          to.setMonth(to.getMonth() + 1);
        } else if (dateFilter === 'custom') {
          if (!customRange.start || !customRange.end) return true;
          from = toDate(customRange.start);
          to = toDate(customRange.end);
        } else {
          return true; // 필터 없음 = 전체
        }

        // 축제 기간이 [from, to]와 겹치면 표시
        return start <= to && end >= from;
      }

      // ── 필터 적용 (핀 보이기/숨기기 + 뭉치 재계산) ──
      function applyFilters() {
        let visibleCount = 0;

        pinOverlays.forEach((pin) => {
          const f = pin.festival;
          let show = true;

          // 1. 카테고리: 현재는 축제만 데이터 있음
          if (!activeCategories.festival) show = false;

          // 2. 날짜 미정 축제 처리
          if (pin.isUnknown) {
            show = showUnknown; // 토글에 따라
          } else if (show && !matchesDateFilter(f)) {
            // 3. 날짜 필터
            show = false;
          }

          pin.passesFilter = show;
          pin.setVisible(show);
          if (show) visibleCount++;
        });

        document.getElementById('cnt-festival').textContent = visibleCount;
        recluster(); // 보이는 핀들로 뭉치 다시 계산
      }

      // ── 정보 패널 ──
      function openFestivalPanel(f) {
        const panel = document.getElementById('info-panel');

        // 길찾기 메뉴는 매번 닫고 시작 (다른 축제 누를 때 초기화)
        document.getElementById('map-picker').classList.remove('show');

        document.getElementById('panel-img').textContent = '🎪';
        document.getElementById('panel-img').style.fontSize = '4rem';

        // 제목 설정 (크기 조절은 패널이 화면에 뜬 뒤에 함)
        const titleEl = document.getElementById('panel-title');
        titleEl.textContent = f.title || '제목 없음';

        document.getElementById('panel-date').textContent = f.date_start
          ? f.date_start + (f.date_end ? ' ~ ' + f.date_end : '')
          : '날짜 미정';
        document.getElementById('panel-loc').textContent =
          f.location_name || '장소 미정';
        document.getElementById('panel-time').textContent = f.address || '';

        currentFestival = f; // 길찾기/검색용 저장

        // 조명탄 누적 수 (지금은 임시값, 추후 Supabase 연동)
        flareCount = getInitialFlareCount(f);
        document.getElementById('flare-count').textContent = flareCount;

        // 애니메이션 재생을 위해 클래스 재적용
        panel.classList.remove('show');
        void panel.offsetWidth; // 리플로우 트릭
        panel.classList.add('show');

        // 패널이 화면에 뜬 뒤 제목 폭을 재서 글자 크기 조절 (2줄 방지)
        fitTitle(titleEl);
      }

      // ── 제목 길이에 따라 글자 크기 줄여 한 줄 유지 ──
      function fitTitle(el) {
        const sizes = [1, 0.92, 0.85, 0.78]; // rem 단계
        // 넘치면 한 단계씩 줄임 (마지막 단계까지 넘치면 ...으로 잘림)
        for (let i = 0; i < sizes.length; i++) {
          el.style.fontSize = sizes[i] + 'rem';
          if (el.scrollWidth <= el.clientWidth) break;
        }
      }

      function closePanel() {
        document.getElementById('info-panel').classList.remove('show');
        document.getElementById('map-picker').classList.remove('show');
        // 노란 핀 다시 핑크로
        if (selectedPin) {
          selectedPin.setSelected(false);
          selectedPin = null;
        }
      }

      // ── 핀 선택(노란색) 처리 ──
      function selectPin(pin) {
        if (selectedPin && selectedPin !== pin) selectedPin.setSelected(false);
        selectedPin = pin;
        pin.setSelected(true);
      }

      // ── 조명탄 쏘기 (여러 번 가능, 팡 효과 + 카운트 +1) ──
      function shootFlare(e) {
        flareCount += 1;
        document.getElementById('flare-count').textContent = flareCount;

        const btn = document.getElementById('flare-btn');
        // 아이콘 팡 튀기기
        btn.classList.remove('popping');
        void btn.offsetWidth; // 리플로우로 애니메이션 재시작
        btn.classList.add('popping');

        // 사방으로 퍼지는 불꽃 입자
        spawnFlareParticles(btn);

        // TODO: 추후 Supabase에 조명탄 수 저장/집계 연동
      }

      // ── 불꽃 입자 생성 (버튼 중심에서 사방으로) ──
      function spawnFlareParticles(btn) {
        const colors = ['#ff6b6b', '#ffd93d', '#ffb3a0', '#ff8fa0', '#fff'];
        const count = 10;
        const rect = btn.getBoundingClientRect();
        for (let i = 0; i < count; i++) {
          const p = document.createElement('span');
          p.className = 'flare-particle';
          p.style.background = colors[i % colors.length];
          p.style.boxShadow = '0 0 6px ' + colors[i % colors.length];
          // 버튼 중앙에 배치
          p.style.left = rect.width / 2 + 'px';
          p.style.top = rect.height / 2 + 'px';
          // 원형으로 고르게 퍼지는 방향
          const angle = (2 * Math.PI * i) / count;
          const dist = 26 + Math.random() * 12;
          p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
          p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
          p.style.animation = 'particle-fly 0.55s ease-out forwards';
          btn.appendChild(p);
          setTimeout(() => p.remove(), 600);
        }
      }

      // ── DB 연동 전 임시 조명탄 시작값 ──
      // (제목 길이 기반으로 그럴듯한 숫자 — 추후 실제 집계로 교체)
      function getInitialFlareCount(f) {
        const base = (f.title || '').length * 3 + 7;
        return base % 90; // 0~89 사이 적당한 값
      }

      // ── 제목 옆 링크: 구글에 축제명 검색 ──
      function searchFestival() {
        if (!currentFestival) return;
        const q = encodeURIComponent(currentFestival.title || '축제');
        window.open('https://www.google.com/search?q=' + q + '&udm=50', '_blank');
      }

      function openComment() {
        alert('댓글 기능은 곧 추가될 예정이에요! 😊');
      }

      // ── 길찾기 지도 선택 ──
      function toggleMapPicker() {
        document.getElementById('map-picker').classList.toggle('show');
      }

      function openMap(type) {
        if (!currentFestival) return;
        const lat = currentFestival.latitude;
        const lng = currentFestival.longitude;
        const place = encodeURIComponent(
          currentFestival.location_name ||
            currentFestival.address ||
            currentFestival.title ||
            '목적지'
        );
        let url = '';

        if (type === 'kakao') {
          url = `https://map.kakao.com/?q=${place}`;
        } else if (type === 'naver') {
          url = `https://map.naver.com/v5/search/${place}`;
        } else if (type === 'google') {
          // 좌표가 있으면 정확한 좌표로, 없으면 장소명으로
          url =
            lat && lng
              ? `https://www.google.com/maps/search/?api=1&query=${lat},${lng}`
              : `https://www.google.com/maps/search/?api=1&query=${place}`;
        }

        if (url) window.open(url, '_blank');
      }

      // ── 날짜 버튼 ──
      function setDate(el, type) {
        document
          .querySelectorAll('.date-btn')
          .forEach((b) => b.classList.remove('active'));
        el.classList.add('active');

        const rangeBox = document.getElementById('date-range');

        if (type === 'custom') {
          // 직접 입력: 날짜 칸 뿅
          rangeBox.classList.add('show');
          const s = document.getElementById('range-start').value;
          const e = document.getElementById('range-end').value;
          // 아직 둘 다 안 골랐으면 전체 표시, 다 골랐으면 기간 필터
          dateFilter = s && e ? 'custom' : 'none';
        } else {
          // 다른 버튼: 날짜 칸 숨기고 입력값 초기화
          rangeBox.classList.remove('show');
          document.getElementById('range-start').value = '';
          document.getElementById('range-end').value = '';
          customRange = { start: null, end: null };
          dateFilter = type;
        }

        applyFilters();
      }

      // ── 기간 직접 설정 ──
      function setCustomRange() {
        const s = document.getElementById('range-start').value;
        const e = document.getElementById('range-end').value;
        customRange.start = s || null;
        customRange.end = e || null;

        if (s && e) dateFilter = 'custom';

        applyFilters();
      }

      // ── 미정 축제 토글 ──
      function toggleUnknown() {
        showUnknown = !showUnknown;
        document
          .getElementById('unknown-toggle')
          .classList.toggle('active', showUnknown);
        applyFilters();
      }

      // ── 카테고리 토글 ──
      function toggleFilter(el, type) {
        const activeClass = 'active-' + type;
        if (el.classList.contains(activeClass)) {
          el.classList.remove(activeClass);
          activeCategories[type] = false;
        } else {
          el.classList.add(activeClass);
          activeCategories[type] = true;
        }
        applyFilters();
      }

      // ── 진행 중 축제인지 판단 (오늘이 시작~종료 사이) ──
      function isOngoingFestival(f) {
        if (!f.date_start) return false; // 날짜 미정은 제외
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const start = toDate(f.date_start);
        const end = toDate(f.date_end) || start;
        return start <= today && today <= end;
      }

      // ── 내 위치로 이동 ──
      function goToMyLocation() {
        const btn = document.getElementById('locate-btn');

        if (!navigator.geolocation) {
          alert('이 브라우저에서는 위치 기능을 쓸 수 없어요 😢');
          return;
        }

        btn.classList.add('locating'); // 빙글빙글 표시

        navigator.geolocation.getCurrentPosition(
          (pos) => {
            btn.classList.remove('locating');
            const latLng = new google.maps.LatLng(
              pos.coords.latitude,
              pos.coords.longitude
            );
            map.panTo(latLng);
            map.setZoom(13);
            showMyLocationDot(latLng);
          },
          (err) => {
            btn.classList.remove('locating');
            if (err.code === err.PERMISSION_DENIED) {
              alert(
                '위치 권한이 거부되어 있어요.\n브라우저 주소창 옆 자물쇠 아이콘에서 위치를 "허용"으로 바꿔주세요 📍'
              );
            } else {
              alert('위치를 찾지 못했어요. 잠시 후 다시 시도해주세요.');
            }
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      }

      // ── 내 위치 파란 점 표시 ──
      function showMyLocationDot(latLng) {
        if (myLocationMarker) {
          myLocationMarker.setMap(null);
          myLocationMarker = null;
        }

        class MyDot extends google.maps.OverlayView {
          constructor(position) {
            super();
            this.position = position;
            this.div = null;
          }
          onAdd() {
            const div = document.createElement('div');
            div.className = 'my-location-dot';
            div.style.position = 'absolute';
            div.style.willChange = 'transform';
            this.div = div;
            this.getPanes().overlayLayer.appendChild(div);
          }
          draw() {
            if (!this.div) return;
            const p = this.getProjection().fromLatLngToDivPixel(this.position);
            if (p) {
              this.div.style.transform =
                'translate(' + (p.x - 8) + 'px,' + (p.y - 8) + 'px)';
            }
          }
          onRemove() {
            if (this.div) {
              this.div.parentNode.removeChild(this.div);
              this.div = null;
            }
          }
        }

        myLocationMarker = new MyDot(latLng);
        myLocationMarker.setMap(map);
      }

      // ── 모바일 사이드바 ──
      function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const btn = document.getElementById('menu-toggle');
        const isOpen = sidebar.classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('show');
        // 버튼도 메뉴 따라 이동 + 아이콘 전환 (☰ ↔ ✕)
        btn.classList.toggle('menu-open', isOpen);
        btn.textContent = isOpen ? '✕' : '☰';
      }
      function closeSidebar() {
        const btn = document.getElementById('menu-toggle');
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('show');
        btn.classList.remove('menu-open');
        btn.textContent = '☰';
      }

      // ── 모달 ──
      function openModal() {
        document.getElementById('modal-overlay').classList.add('show');
      }
      function closeModal(e) {
        if (!e || e.target === document.getElementById('modal-overlay')) {
          document.getElementById('modal-overlay').classList.remove('show');
        }
      }

      // ── 시작 ──
      loadFestivals();
    </script>

    ></script>
