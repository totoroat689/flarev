<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flare(V) — 기쁨을 발견하고 순간을 공유하다</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --sidebar: #10101a;
        --panel: #14141f;
        --border: rgba(255, 255, 255, 0.07);
        --text: #f0f0f5;
        --muted: #6b6b80;
        --festival: #ff6b6b;
        --discount: #ffd93d;
        --live: #6bffb8;
        --festival-bg: rgba(255, 107, 107, 0.12);
        --discount-bg: rgba(255, 217, 61, 0.12);
        --live-bg: rgba(107, 255, 184, 0.12);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Noto Sans KR', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
      }

      /* ── SIDEBAR ── */
      #sidebar {
        width: 280px;
        min-width: 280px;
        background: var(--sidebar);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        z-index: 100;
        position: relative;
      }

      .logo-wrap {
        padding: 28px 24px 20px;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2rem;
        letter-spacing: 3px;
        line-height: 1;
      }

      .logo span {
        color: var(--festival);
        text-shadow: 0 0 18px rgba(255, 107, 107, 0.7);
      }

      .logo-sub {
        font-size: 0.68rem;
        color: var(--muted);
        letter-spacing: 1.5px;
        margin-top: 4px;
        text-transform: uppercase;
      }

      /* 날짜 필터 */
      .section {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
      }

      .section-label {
        font-size: 0.65rem;
        letter-spacing: 2px;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .date-row {
        display: flex;
        gap: 6px;
      }

      .date-btn {
        flex: 1;
        padding: 7px 0;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 0.72rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.2s;
      }

      .date-btn.active {
        background: var(--festival-bg);
        border-color: var(--festival);
        color: var(--festival);
      }

      .date-btn:hover:not(.active) {
        border-color: rgba(255, 255, 255, 0.2);
        color: var(--text);
      }

      /* 카테고리 필터 */
      .filter-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .filter-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }

      .filter-item.active-festival {
        background: var(--festival-bg);
        border-color: rgba(255, 107, 107, 0.3);
      }

      .filter-item.active-discount {
        background: var(--discount-bg);
        border-color: rgba(255, 217, 61, 0.3);
      }

      .filter-item.active-live {
        background: var(--live-bg);
        border-color: rgba(107, 255, 184, 0.3);
      }

      .filter-item:not(.active-festival):not(.active-discount):not(
          .active-live
        ):hover {
        background: rgba(255, 255, 255, 0.04);
      }

      .filter-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .dot-festival {
        background: var(--festival);
        box-shadow: 0 0 8px rgba(255, 107, 107, 0.8);
      }
      .dot-discount {
        background: var(--discount);
        box-shadow: 0 0 8px rgba(255, 217, 61, 0.8);
      }
      .dot-live {
        background: var(--live);
        box-shadow: 0 0 8px rgba(107, 255, 184, 0.8);
      }

      .filter-text {
        flex: 1;
        font-size: 0.82rem;
        font-weight: 500;
      }
      .filter-count {
        font-size: 0.7rem;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.06);
        padding: 2px 8px;
        border-radius: 20px;
      }

      /* 로그인 */
      .login-wrap {
        margin-top: auto;
        padding: 20px 24px;
        border-top: 1px solid var(--border);
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        font-size: 0.82rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.25s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .login-btn:hover {
        background: rgba(255, 107, 107, 0.1);
        border-color: var(--festival);
        color: var(--festival);
      }

      /* ── MAP AREA ── */
      #map-container {
        flex: 1;
        position: relative;
      }

      #map {
        width: 100%;
        height: 100%;
        background: #0d1117;
      }

      /* 구글 지도 다크 모드 */
      #map {
        width: 100%;
        height: 100%;
      }

      /* 커스텀 핑 마커 */
      .custom-pin {
        position: absolute;
        transform: translate(-50%, -100%);
        cursor: pointer;
        z-index: 10;
        animation: pin-appear 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      @keyframes pin-appear {
        from {
          transform: translate(-50%, -120%) scale(0);
          opacity: 0;
        }
        to {
          transform: translate(-50%, -100%) scale(1);
          opacity: 1;
        }
      }

      .pin-body {
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        white-space: nowrap;
        border: 1px solid;
        transition: all 0.2s;
        backdrop-filter: blur(10px);
      }

      .pin-body:hover {
        transform: scale(1.08);
      }

      .pin-festival {
        background: rgba(255, 107, 107, 0.2);
        border-color: var(--festival);
        color: var(--festival);
        box-shadow: 0 0 16px rgba(255, 107, 107, 0.4);
      }

      .pin-discount {
        background: rgba(255, 217, 61, 0.2);
        border-color: var(--discount);
        color: var(--discount);
        box-shadow: 0 0 16px rgba(255, 217, 61, 0.4);
      }

      .pin-live {
        background: rgba(107, 255, 184, 0.2);
        border-color: var(--live);
        color: var(--live);
        box-shadow: 0 0 16px rgba(107, 255, 184, 0.4);
      }

      .pin-tail {
        width: 2px;
        height: 10px;
        margin: 0 auto;
        border-radius: 2px;
      }

      .tail-festival {
        background: var(--festival);
        box-shadow: 0 0 6px rgba(255, 107, 107, 0.8);
      }
      .tail-discount {
        background: var(--discount);
        box-shadow: 0 0 6px rgba(255, 217, 61, 0.8);
      }
      .tail-live {
        background: var(--live);
        box-shadow: 0 0 6px rgba(107, 255, 184, 0.8);
      }

      /* ── INFO PANEL ── */
      #info-panel {
        position: absolute;
        right: 24px;
        top: 24px;
        width: 320px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        z-index: 200;
        display: none;
        animation: panel-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        backdrop-filter: blur(20px);
      }

      @keyframes panel-in {
        from {
          transform: translateX(20px) scale(0.95);
          opacity: 0;
        }
        to {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
      }

      .panel-header {
        padding: 16px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }

      .panel-badge {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        padding: 4px 10px;
        border-radius: 20px;
        text-transform: uppercase;
      }

      .badge-festival {
        background: var(--festival-bg);
        color: var(--festival);
        border: 1px solid rgba(255, 107, 107, 0.3);
      }
      .badge-discount {
        background: var(--discount-bg);
        color: var(--discount);
        border: 1px solid rgba(255, 217, 61, 0.3);
      }
      .badge-live {
        background: var(--live-bg);
        color: var(--live);
        border: 1px solid rgba(107, 255, 184, 0.3);
      }

      .panel-close {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 1.2rem;
        line-height: 1;
        padding: 2px 6px;
        border-radius: 6px;
        transition: all 0.2s;
      }

      .panel-close:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .panel-img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
      }

      .panel-body {
        padding: 16px 18px;
      }

      .panel-title {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 6px;
        line-height: 1.3;
      }

      .panel-meta {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 14px;
      }

      .meta-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
        color: var(--muted);
      }

      .meta-icon {
        font-size: 0.85rem;
      }

      /* 따봉 & 댓글 */
      .reaction-row {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }

      .reaction-btn {
        flex: 1;
        padding: 9px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 0.78rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .reaction-btn:hover {
        background: rgba(255, 107, 107, 0.1);
        border-color: rgba(255, 107, 107, 0.4);
        color: var(--festival);
      }

      .reaction-btn.liked {
        background: rgba(255, 107, 107, 0.15);
        border-color: var(--festival);
        color: var(--festival);
      }

      .nav-btn {
        width: 100%;
        padding: 11px;
        border-radius: 10px;
        border: none;
        font-size: 0.82rem;
        font-family: 'Noto Sans KR', sans-serif;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.5px;
      }

      .nav-festival {
        background: var(--festival);
        color: #0a0a0f;
      }
      .nav-discount {
        background: var(--discount);
        color: #0a0a0f;
      }
      .nav-live {
        background: var(--live);
        color: #0a0a0f;
      }

      .nav-btn:hover {
        opacity: 0.85;
        transform: translateY(-1px);
      }

      /* 사진 업로드 버튼 (우측 하단) */
      #upload-btn {
        position: absolute;
        bottom: 32px;
        right: 32px;
        padding: 14px 24px;
        border-radius: 50px;
        border: none;
        background: var(--festival);
        color: #0a0a0f;
        font-size: 0.85rem;
        font-family: 'Noto Sans KR', sans-serif;
        font-weight: 700;
        cursor: pointer;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 0 24px rgba(255, 107, 107, 0.5);
        transition: all 0.25s;
        letter-spacing: 0.5px;
      }

      #upload-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 36px rgba(255, 107, 107, 0.7);
      }

      /* 로그인 모달 */
      #modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        z-index: 999;
        display: none;
        align-items: center;
        justify-content: center;
      }

      #modal-overlay.show {
        display: flex;
      }

      .modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 36px;
        width: 340px;
        text-align: center;
        animation: panel-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }

      .modal-logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.2rem;
        letter-spacing: 3px;
        margin-bottom: 6px;
      }

      .modal-logo span {
        color: var(--festival);
        text-shadow: 0 0 18px rgba(255, 107, 107, 0.7);
      }

      .modal h3 {
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 28px;
      }

      .modal-btn {
        width: 100%;
        padding: 13px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-size: 0.85rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        margin-bottom: 10px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .modal-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .modal-cancel {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 0.8rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        margin-top: 8px;
        padding: 8px;
      }

      .modal-cancel:hover {
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <!-- ── SIDEBAR ── -->
    <nav id="sidebar">
      <div class="logo-wrap">
        <div class="logo">FLARE<span>(V)</span></div>
        <div class="logo-sub">기쁨을 발견하고 순간을 공유하다</div>
      </div>

      <!-- 날짜 필터 -->
      <div class="section">
        <div class="section-label">날짜</div>
        <div class="date-row">
          <button class="date-btn active" onclick="setDate(this,'today')">
            오늘
          </button>
          <button class="date-btn" onclick="setDate(this,'tomorrow')">
            내일
          </button>
          <button class="date-btn" onclick="setDate(this,'week')">
            이번 주
          </button>
        </div>
      </div>

      <!-- 카테고리 필터 -->
      <div class="section">
        <div class="section-label">카테고리</div>
        <div class="filter-list">
          <div
            class="filter-item active-festival"
            onclick="toggleFilter(this,'festival')"
          >
            <div class="filter-dot dot-festival"></div>
            <span class="filter-text">🎪 축제</span>
            <span class="filter-count" id="cnt-festival">3</span>
          </div>
          <div
            class="filter-item active-discount"
            onclick="toggleFilter(this,'discount')"
          >
            <div class="filter-dot dot-discount"></div>
            <span class="filter-text">🏷️ 할인 / 이벤트</span>
            <span class="filter-count" id="cnt-discount">5</span>
          </div>
          <div
            class="filter-item active-live"
            onclick="toggleFilter(this,'live')"
          >
            <div class="filter-dot dot-live"></div>
            <span class="filter-text">📸 실시간 현장</span>
            <span class="filter-count" id="cnt-live">8</span>
          </div>
        </div>
      </div>

      <div class="login-wrap">
        <button class="login-btn" onclick="openModal()">
          <span>🔐</span> 로그인 / 회원가입
        </button>
      </div>
    </nav>

    <!-- ── MAP ── -->
    <div id="map-container">
      <div id="map"></div>

      <!-- 정보 패널 -->
      <div id="info-panel">
        <div class="panel-header">
          <span class="panel-badge" id="panel-badge">축제</span>
          <button class="panel-close" onclick="closePanel()">✕</button>
        </div>
        <div class="panel-img" id="panel-img">🎪</div>
        <div class="panel-body">
          <div class="panel-title" id="panel-title">서울 빛 축제 2025</div>
          <div class="panel-meta">
            <div class="meta-row">
              <span class="meta-icon">📅</span
              ><span id="panel-date">2025.05.25 (토) ~ 06.01 (일)</span>
            </div>
            <div class="meta-row">
              <span class="meta-icon">📍</span
              ><span id="panel-loc">서울 광화문 광장</span>
            </div>
            <div class="meta-row">
              <span class="meta-icon">🕐</span
              ><span id="panel-time">오후 6시 ~ 오후 11시</span>
            </div>
          </div>
          <div class="reaction-row">
            <button class="reaction-btn" id="like-btn" onclick="toggleLike()">
              <span>👍</span><span id="like-count">128</span>
            </button>
            <button class="reaction-btn" onclick="openComment()">
              <span>💬</span><span>댓글 24</span>
            </button>
          </div>
          <button class="nav-btn" id="nav-btn">📍 길 찾기</button>
        </div>
      </div>

      <!-- 사진 업로드 버튼 -->
      <button id="upload-btn" onclick="openModal()">
        <span>📸</span> 지금 이 순간 공유하기
      </button>
    </div>

    <!-- 로그인 모달 -->
    <div id="modal-overlay" onclick="closeModal(event)">
      <div class="modal">
        <div class="modal-logo">FLARE<span>(V)</span></div>
        <h3>사진 공유를 위해 로그인이 필요해요</h3>
        <button class="modal-btn">
          <img src="https://www.google.com/favicon.ico" width="18" /> 구글로
          계속하기
        </button>
        <button class="modal-btn"><span>🍎</span> 애플로 계속하기</button>
        <button class="modal-btn"><span>📧</span> 이메일로 계속하기</button>
        <button class="modal-cancel" onclick="closeModal()">취소</button>
      </div>
    </div>

    <script>
      // ── 구글 지도 다크 스타일 ──
      const darkStyle = [
        { elementType: 'geometry', stylers: [{ color: '#0d0d14' }] },
        { elementType: 'labels.text.fill', stylers: [{ color: '#6b6b80' }] },
        { elementType: 'labels.text.stroke', stylers: [{ color: '#0a0a0f' }] },
        {
          featureType: 'road',
          elementType: 'geometry',
          stylers: [{ color: '#1a1a2e' }],
        },
        {
          featureType: 'road',
          elementType: 'geometry.stroke',
          stylers: [{ color: '#212135' }],
        },
        {
          featureType: 'road.highway',
          elementType: 'geometry',
          stylers: [{ color: '#22223a' }],
        },
        {
          featureType: 'water',
          elementType: 'geometry',
          stylers: [{ color: '#070710' }],
        },
        {
          featureType: 'poi',
          elementType: 'geometry',
          stylers: [{ color: '#111120' }],
        },
        {
          featureType: 'poi.park',
          elementType: 'geometry',
          stylers: [{ color: '#0e1a0e' }],
        },
        {
          featureType: 'transit',
          elementType: 'geometry',
          stylers: [{ color: '#141425' }],
        },
      ];

      let map;

      function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 37.5665, lng: 126.978 },
          zoom: 13,
          styles: darkStyle,
          disableDefaultUI: true,
          zoomControl: true,
          zoomControlOptions: {
            position: google.maps.ControlPosition.RIGHT_CENTER,
          },
        });

        // 마커 데이터
        const markers = [
          {
            lat: 37.575,
            lng: 126.9768,
            type: 'festival',
            idx: 0,
            label: '🎪 서울 빛축제',
          },
          {
            lat: 37.512,
            lng: 126.9947,
            type: 'festival',
            idx: 1,
            label: '🎪 한강 버스킹',
          },
          {
            lat: 37.5563,
            lng: 126.9236,
            type: 'discount',
            idx: 0,
            label: '🏷️ 홍대 팝업스토어',
          },
          {
            lat: 37.4979,
            lng: 127.0276,
            type: 'discount',
            idx: 1,
            label: '🏷️ 강남 50% 세일',
          },
          {
            lat: 37.5596,
            lng: 126.937,
            type: 'live',
            idx: 0,
            label: '📸 지금 여기!',
          },
          {
            lat: 37.5345,
            lng: 126.994,
            type: 'live',
            idx: 1,
            label: '📸 실시간 현장',
          },
        ];

        const colors = {
          festival: '#FF6B6B',
          discount: '#FFD93D',
          live: '#6BFFB8',
        };

        markers.forEach((m) => {
          const marker = new google.maps.Marker({
            position: { lat: m.lat, lng: m.lng },
            map,
            label: {
              text: m.label,
              color: colors[m.type],
              fontSize: '12px',
              fontWeight: 'bold',
              fontFamily: 'Noto Sans KR, sans-serif',
            },
            icon: {
              path: google.maps.SymbolPath.CIRCLE,
              scale: 10,
              fillColor: colors[m.type],
              fillOpacity: 0.9,
              strokeColor: colors[m.type],
              strokeWeight: 2,
            },
          });

          marker.addListener('click', () => openPanel(m.type, m.idx));
        });
      }

      // ── 데이터 ──
      const data = {
        festival: [
          {
            title: '서울 빛 축제 2025',
            date: '2025.05.25 (토) ~ 06.01 (일)',
            loc: '서울 광화문 광장',

            time: '오전 11시 ~ 오후 9시',
            emoji: '🛍️',

          },
          {
            title: '강남 여름 세일 50%',
            date: '2025.05.25 ~ 05.30',
            loc: '강남역 지하상가',
            time: '종일',
            emoji: '🏷️',
            likes: 203,
            comments: 41,
          },
        ],
        live: [
          {
            title: '지금 여기! 거리 공연 중',
            date: '2025.05.25 오늘',
            loc: '신촌 연세로',
            time: '지금 진행 중 🔴',
            emoji: '🎤',
            likes: 32,
            comments: 7,
          },
          {
            title: '실시간 현장 공유',
            date: '2025.05.25 오늘',
            loc: '이태원 앤틱가구거리',
            time: '지금 진행 중 🔴',
            emoji: '📸',
            likes: 19,
            comments: 3,
          },
        ],
      };

      let currentLikes = 0;
      let liked = false;

      // 패널 열기
      function openPanel(type, idx) {
        const d = data[type][idx];
        const panel = document.getElementById('info-panel');
        const badge = document.getElementById('panel-badge');
        const navBtn = document.getElementById('nav-btn');

        badge.className = 'panel-badge badge-' + type;
        badge.textContent =
          type === 'festival'
            ? '🎪 축제'
            : type === 'discount'
            ? '🏷️ 할인/이벤트'
            : '📸 실시간 현장';

        document.getElementById('panel-img').textContent = d.emoji;
        document.getElementById('panel-img').style.fontSize = '4rem';
        document.getElementById('panel-title').textContent = d.title;
        document.getElementById('panel-date').textContent = d.date;
        document.getElementById('panel-loc').textContent = d.loc;
        document.getElementById('panel-time').textContent = d.time;

        currentLikes = d.likes;
        liked = false;
        document.getElementById('like-btn').className = 'reaction-btn';
        document.getElementById('like-count').textContent = currentLikes;

        navBtn.className = 'nav-btn nav-' + type;

        panel.style.display = 'block';
      }

      function closePanel() {
        document.getElementById('info-panel').style.display = 'none';
      }

      // 따봉
      function toggleLike() {
        liked = !liked;
        currentLikes += liked ? 1 : -1;
        const btn = document.getElementById('like-btn');
        btn.className = liked ? 'reaction-btn liked' : 'reaction-btn';
        document.getElementById('like-count').textContent = currentLikes;
      }

      function openComment() {
        alert('댓글 기능은 곧 추가될 예정이에요! 😊');
      }

      // 날짜 버튼
      function setDate(el, type) {
        document
          .querySelectorAll('.date-btn')
          .forEach((b) => b.classList.remove('active'));
        el.classList.add('active');
      }

      // 카테고리 토글
      function toggleFilter(el, type) {
        const activeClass = 'active-' + type;
        if (el.classList.contains(activeClass)) {
          el.classList.remove(activeClass);
        } else {
          el.classList.add(activeClass);
        }
      }

      // 모달
      function openModal() {
        document.getElementById('modal-overlay').classList.add('show');
      }

      function closeModal(e) {
        if (!e || e.target === document.getElementById('modal-overlay')) {
          document.getElementById('modal-overlay').classList.remove('show');
        }
      }
    </script>
