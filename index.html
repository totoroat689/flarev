<!DOCTYPE html>
<!-- ============================================
     Flare(V) 홈페이지
     버전: v1.5
     수정일: 2026-06-01
     수정사항:
       - 팝업 글자 흰색으로 변경
       - 팝업 등장 애니메이션 (슉 튀어나오기)
       - 핀 색 구분 (날짜 있음=핑크 / 미확인=회색)
       - 카테고리 필터: 누른 것만 표시 (기본 축제 ON)
       - 날짜 필터: 오늘/내일/이번주/이번달 + 기간 설정(달력)
       - "미정 축제 보기" 토글 버튼
       - 모바일 햄버거 메뉴 (사이드바 토글)
       - POI 라벨 숨김 / 모바일 지도 조작 개선
     ============================================ -->
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flare(V) — 기쁨을 발견하고 순간을 공유하다</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0a0a0f;
        --sidebar: #10101a;
        --panel: #14141f;
        --border: rgba(255, 255, 255, 0.07);
        --text: #f0f0f5;
        --muted: #6b6b80;
        --festival: #ff6b6b;
        --discount: #ffd93d;
        --live: #6bffb8;
        --festival-bg: rgba(255, 107, 107, 0.12);
        --discount-bg: rgba(255, 217, 61, 0.12);
        --live-bg: rgba(107, 255, 184, 0.12);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Noto Sans KR', sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
      }

      /* ── SIDEBAR ── */
      #sidebar {
        width: 280px;
        min-width: 280px;
        background: var(--sidebar);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        z-index: 100;
        position: relative;
        overflow-y: auto;
        transition: transform 0.3s ease;
      }

      .logo-wrap {
        padding: 28px 24px 20px;
        border-bottom: 1px solid var(--border);
      }

      .logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2rem;
        letter-spacing: 3px;
        line-height: 1;
      }

      .logo span {
        color: var(--festival);
        text-shadow: 0 0 18px rgba(255, 107, 107, 0.7);
      }

      .logo-sub {
        font-size: 0.68rem;
        color: var(--muted);
        letter-spacing: 1.5px;
        margin-top: 4px;
        text-transform: uppercase;
      }

      .section {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
      }

      .section-label {
        font-size: 0.65rem;
        letter-spacing: 2px;
        color: var(--muted);
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      /* 날짜 버튼 (4개) */
      .date-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 6px;
      }

      .date-btn {
        padding: 8px 0;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 0.72rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.2s;
      }

      .date-btn.active {
        background: var(--festival-bg);
        border-color: var(--festival);
        color: var(--festival);
      }

      .date-btn:hover:not(.active) {
        border-color: rgba(255, 255, 255, 0.2);
        color: var(--text);
      }

      /* 기간 설정 (달력) */
      .date-range {
        margin-top: 10px;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .date-range label {
        font-size: 0.65rem;
        color: var(--muted);
      }

      .date-range input[type='date'] {
        width: 100%;
        padding: 7px 10px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--text);
        font-size: 0.72rem;
        font-family: 'Noto Sans KR', sans-serif;
        color-scheme: dark; /* 달력 팝업도 다크로 */
      }

      .date-range input[type='date']:focus {
        outline: none;
        border-color: var(--festival);
      }

      /* 미정 축제 보기 토글 */
      .unknown-toggle {
        margin-top: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 0.76rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        width: 100%;
        text-align: left;
      }

      .unknown-toggle .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #888;
        flex-shrink: 0;
      }

      .unknown-toggle.active {
        background: rgba(150, 150, 150, 0.15);
        border-color: #999;
        color: var(--text);
      }

      /* 카테고리 필터 */
      .filter-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .filter-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: all 0.2s;
        user-select: none;
      }

      .filter-item.active-festival {
        background: var(--festival-bg);
        border-color: rgba(255, 107, 107, 0.3);
      }

      .filter-item.active-discount {
        background: var(--discount-bg);
        border-color: rgba(255, 217, 61, 0.3);
      }

      .filter-item.active-live {
        background: var(--live-bg);
        border-color: rgba(107, 255, 184, 0.3);
      }

      .filter-item:not(.active-festival):not(.active-discount):not(
          .active-live
        ):hover {
        background: rgba(255, 255, 255, 0.04);
      }

      .filter-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .dot-festival {
        background: var(--festival);
        box-shadow: 0 0 8px rgba(255, 107, 107, 0.8);
      }
      .dot-discount {
        background: var(--discount);
        box-shadow: 0 0 8px rgba(255, 217, 61, 0.8);
      }
      .dot-live {
        background: var(--live);
        box-shadow: 0 0 8px rgba(107, 255, 184, 0.8);
      }

      .filter-text {
        flex: 1;
        font-size: 0.82rem;
        font-weight: 500;
      }
      .filter-count {
        font-size: 0.7rem;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.06);
        padding: 2px 8px;
        border-radius: 20px;
      }

      .login-wrap {
        margin-top: auto;
        padding: 20px 24px;
        border-top: 1px solid var(--border);
      }

      .login-btn {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text);
        font-size: 0.82rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.25s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
      }

      .login-btn:hover {
        background: rgba(255, 107, 107, 0.1);
        border-color: var(--festival);
        color: var(--festival);
      }

      /* ── 햄버거 메뉴 버튼 (모바일 전용) ── */
      #menu-toggle {
        position: absolute;
        top: 16px;
        left: 16px;
        width: 44px;
        height: 44px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(20, 20, 31, 0.85);
        backdrop-filter: blur(10px);
        color: var(--text);
        font-size: 1.2rem;
        cursor: pointer;
        z-index: 400;
        display: none; /* PC에선 숨김 */
        align-items: center;
        justify-content: center;
      }

      /* 사이드바 바깥 어두운 배경 (모바일에서 열렸을 때) */
      #sidebar-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 90;
        display: none;
      }
      #sidebar-overlay.show {
        display: block;
      }

      /* ── MAP AREA ── */
      #map-container {
        flex: 1;
        position: relative;
      }

      #map {
        width: 100%;
        height: 100%;
        background: #0d1117;
      }

      /* ── 커스텀 축제 핀 ── */
      .flare-pin {
        position: relative;
        cursor: pointer;
      }

      .flare-dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 35%, #ffb3a0, #ff6b8b);
        box-shadow: 0 0 10px rgba(255, 107, 139, 0.9),
          0 0 20px rgba(255, 107, 139, 0.5);
        position: relative;
        animation: dot-pulse 2.5s ease-in-out infinite;
      }

      .flare-dot::after {
        content: '';
        position: absolute;
        inset: -6px;
        border-radius: 50%;
        border: 1px solid rgba(255, 107, 139, 0.5);
        animation: ring-pulse 2.5s ease-in-out infinite;
      }

      /* 날짜 미확인 핀 (회색) */
      .flare-pin.unknown .flare-dot {
        background: radial-gradient(circle at 35% 35%, #c8c8d0, #888);
        box-shadow: 0 0 10px rgba(150, 150, 160, 0.8),
          0 0 20px rgba(150, 150, 160, 0.4);
      }
      .flare-pin.unknown .flare-dot::after {
        border-color: rgba(160, 160, 170, 0.5);
      }
      .flare-pin.unknown .flare-label {
        border-color: rgba(160, 160, 170, 0.55);
      }

      @keyframes dot-pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.15); }
      }

      @keyframes ring-pulse {
        0% { transform: scale(0.8); opacity: 0.8; }
        70% { transform: scale(1.8); opacity: 0; }
        100% { opacity: 0; }
      }

      .flare-label {
        position: absolute;
        left: 20px;
        top: 50%;
        transform: translateY(-50%) translateX(-6px) scale(0.9);
        font-size: 0.74rem;
        font-weight: 700;
        color: #fff;
        white-space: nowrap;
        padding: 4px 11px;
        border-radius: 20px;
        background: rgba(20, 20, 31, 0.82);
        border: 1px solid rgba(255, 107, 139, 0.55);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.5),
          0 0 14px rgba(255, 107, 139, 0.25);
        backdrop-filter: blur(8px);
        letter-spacing: 0.3px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease,
          transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
        max-width: 180px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .flare-pin.zoomed .flare-label {
        opacity: 1;
        transform: translateY(-50%) translateX(0) scale(1);
      }

      .flare-pin:hover {
        z-index: 999 !important;
      }
      .flare-pin:hover .flare-dot {
        transform: scale(1.3);
      }
      .flare-pin:hover .flare-label {
        opacity: 1;
        transform: translateY(-50%) translateX(0) scale(1.05);
        border-color: var(--festival);
      }

      /* ── INFO PANEL ── */
      #info-panel {
        position: absolute;
        right: 24px;
        top: 24px;
        width: 320px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
        z-index: 200;
        display: none;
        backdrop-filter: blur(20px);
        transform-origin: top right;
      }

      /* 팝업 등장 애니메이션 (슉 튀어나오기) */
      #info-panel.show {
        display: block;
        animation: panel-pop 0.4s cubic-bezier(0.34, 1.8, 0.5, 1);
      }

      @keyframes panel-pop {
        0% {
          transform: scale(0.5) translate(40px, -30px);
          opacity: 0;
        }
        60% {
          transform: scale(1.04) translate(0, 0);
          opacity: 1;
        }
        100% {
          transform: scale(1) translate(0, 0);
        }
      }

      .panel-header {
        padding: 16px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
      }

      .panel-badge {
        font-size: 0.65rem;
        font-weight: 700;
        letter-spacing: 1.5px;
        padding: 4px 10px;
        border-radius: 20px;
        text-transform: uppercase;
      }

      .badge-festival {
        background: var(--festival-bg);
        color: var(--festival);
        border: 1px solid rgba(255, 107, 107, 0.3);
      }

      .panel-close {
        background: none;
        border: none;
        color: var(--muted);
        cursor: pointer;
        font-size: 1.2rem;
        line-height: 1;
        padding: 2px 6px;
        border-radius: 6px;
        transition: all 0.2s;
      }

      .panel-close:hover {
        background: rgba(255, 255, 255, 0.08);
        color: var(--text);
      }

      .panel-img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        background: linear-gradient(135deg, #1a1a2e, #16213e);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
      }

      .panel-body {
        padding: 16px 18px;
      }

      .panel-title {
        font-size: 1rem;
        font-weight: 700;
        margin-bottom: 6px;
        line-height: 1.3;
        color: #fff;
      }

      .panel-meta {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-bottom: 14px;
      }

      /* 팝업 정보 글자 흰색으로 */
      .meta-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.75rem;
        color: #e8e8f0;
      }

      .meta-icon {
        font-size: 0.85rem;
      }

      .reaction-row {
        display: flex;
        gap: 8px;
        margin-bottom: 14px;
      }

      .reaction-btn {
        flex: 1;
        padding: 9px;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        font-size: 0.78rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .reaction-btn:hover {
        background: rgba(255, 107, 107, 0.1);
        border-color: rgba(255, 107, 107, 0.4);
        color: var(--festival);
      }

      .reaction-btn.liked {
        background: rgba(255, 107, 107, 0.15);
        border-color: var(--festival);
        color: var(--festival);
      }

      .nav-btn {
        width: 100%;
        padding: 11px;
        border-radius: 10px;
        border: none;
        font-size: 0.82rem;
        font-family: 'Noto Sans KR', sans-serif;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.2s;
        letter-spacing: 0.5px;
      }

      .nav-festival {
        background: var(--festival);
        color: #0a0a0f;
      }

      .nav-btn:hover {
        opacity: 0.85;
        transform: translateY(-1px);
      }

      #upload-btn {
        position: absolute;
        bottom: 32px;
        right: 32px;
        padding: 14px 24px;
        border-radius: 50px;
        border: none;
        background: var(--festival);
        color: #0a0a0f;
        font-size: 0.85rem;
        font-family: 'Noto Sans KR', sans-serif;
        font-weight: 700;
        cursor: pointer;
        z-index: 100;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 0 24px rgba(255, 107, 107, 0.5);
        transition: all 0.25s;
        letter-spacing: 0.5px;
      }

      #loading {
        position: absolute;
        top: 24px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 10px 20px;
        font-size: 0.8rem;
        color: var(--muted);
        z-index: 300;
        display: none;
      }

      /* 로그인 모달 */
      #modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        z-index: 999;
        display: none;
        align-items: center;
        justify-content: center;
      }

      #modal-overlay.show {
        display: flex;
      }

      .modal {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 36px;
        width: 340px;
        text-align: center;
      }

      .modal-logo {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2.2rem;
        letter-spacing: 3px;
        margin-bottom: 6px;
      }

      .modal-logo span {
        color: var(--festival);
        text-shadow: 0 0 18px rgba(255, 107, 107, 0.7);
      }

      .modal h3 {
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 28px;
      }

      .modal-btn {
        width: 100%;
        padding: 13px;
        border-radius: 12px;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.04);
        color: var(--text);
        font-size: 0.85rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        margin-bottom: 10px;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }

      .modal-btn:hover {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.2);
      }

      .modal-cancel {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 0.8rem;
        font-family: 'Noto Sans KR', sans-serif;
        cursor: pointer;
        margin-top: 8px;
        padding: 8px;
      }

      .modal-cancel:hover {
        color: var(--text);
      }

      /* ── 모바일 대응 ── */
      @media (max-width: 768px) {
        #menu-toggle {
          display: flex;
        }

        #sidebar {
          position: fixed;
          top: 0;
          left: 0;
          height: 100%;
          transform: translateX(-100%); /* 평소엔 숨김 */
          box-shadow: 4px 0 24px rgba(0, 0, 0, 0.5);
        }

        #sidebar.open {
          transform: translateX(0); /* 햄버거 누르면 나옴 */
        }

        #info-panel {
          right: 12px;
          left: 12px;
          width: auto;
          top: 70px;
        }

        #upload-btn {
          bottom: 20px;
          right: 20px;
          padding: 12px 18px;
          font-size: 0.78rem;
        }
      }
    </style>
  </head>
  <body>
    <!-- 햄버거 메뉴 버튼 (모바일) -->
    <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
    <!-- 사이드바 바깥 배경 (모바일) -->
    <div id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- ── SIDEBAR ── -->
    <nav id="sidebar">
      <div class="logo-wrap">
        <div class="logo">FLARE<span>(V)</span></div>
        <div class="logo-sub">기쁨을 발견하고 순간을 공유하다</div>
      </div>

      <!-- 날짜 필터 -->
      <div class="section">
        <div class="section-label">날짜</div>
        <div class="date-row">
          <button class="date-btn active" onclick="setDate(this,'today')">
            오늘
          </button>
          <button class="date-btn" onclick="setDate(this,'tomorrow')">
            내일
          </button>
          <button class="date-btn" onclick="setDate(this,'week')">
            이번 주
          </button>
          <button class="date-btn" onclick="setDate(this,'month')">
            이번 달
          </button>
        </div>

        <!-- 기간 직접 설정 -->
        <div class="date-range">
          <label>기간 직접 설정</label>
          <input type="date" id="range-start" onchange="setCustomRange()" />
          <input type="date" id="range-end" onchange="setCustomRange()" />
        </div>

        <!-- 미정 축제 보기 토글 -->
        <button class="unknown-toggle" id="unknown-toggle" onclick="toggleUnknown()">
          <span class="dot"></span>
          <span>날짜 미정 축제 보기</span>
        </button>
      </div>

      <!-- 카테고리 필터 -->
      <div class="section">
        <div class="section-label">카테고리</div>
        <div class="filter-list">
          <div
            class="filter-item active-festival"
            onclick="toggleFilter(this,'festival')"
          >
            <div class="filter-dot dot-festival"></div>
            <span class="filter-text">🎪 축제</span>
            <span class="filter-count" id="cnt-festival">0</span>
          </div>
          <div class="filter-item" onclick="toggleFilter(this,'discount')">
            <div class="filter-dot dot-discount"></div>
            <span class="filter-text">🏷️ 할인 / 이벤트</span>
            <span class="filter-count" id="cnt-discount">0</span>
          </div>
          <div class="filter-item" onclick="toggleFilter(this,'live')">
            <div class="filter-dot dot-live"></div>
            <span class="filter-text">📸 실시간 현장</span>
            <span class="filter-count" id="cnt-live">0</span>
          </div>
        </div>
      </div>

      <div class="login-wrap">
        <button class="login-btn" onclick="openModal()">
          <span>🔐</span> 로그인 / 회원가입
        </button>
      </div>
    </nav>

    <!-- ── MAP ── -->
    <div id="map-container">
      <div id="map"></div>

      <div id="loading">🔄 축제 정보를 불러오는 중...</div>

      <!-- 정보 패널 -->
      <div id="info-panel">
        <div class="panel-header">
          <span class="panel-badge badge-festival" id="panel-badge">축제</span>
          <button class="panel-close" onclick="closePanel()">✕</button>
        </div>
        <div class="panel-img" id="panel-img">🎪</div>
        <div class="panel-body">
          <div class="panel-title" id="panel-title">축제명</div>
          <div class="panel-meta">
            <div class="meta-row">
              <span class="meta-icon">📅</span
              ><span id="panel-date">날짜</span>
            </div>
            <div class="meta-row">
              <span class="meta-icon">📍</span
              ><span id="panel-loc">장소</span>
            </div>
            <div class="meta-row">
              <span class="meta-icon">🏠</span
              ><span id="panel-time">주소</span>
            </div>
          </div>
          <div class="reaction-row">
            <button class="reaction-btn" id="like-btn" onclick="toggleLike()">
              <span>👍</span><span id="like-count">0</span>
            </button>
            <button class="reaction-btn" onclick="openComment()">
              <span>💬</span><span>댓글</span>
            </button>
          </div>
          <button class="nav-btn nav-festival" id="nav-btn">📍 길 찾기</button>
        </div>
      </div>

      <!-- 사진 업로드 버튼 (준비중 - 비활성화) -->
      <button
        id="upload-btn"
        disabled
        style="opacity: 0.45; cursor: not-allowed; box-shadow: none"
      >
        <span>📸</span> 준비 중이에요
      </button>
    </div>

    <!-- 로그인 모달 -->
    <div id="modal-overlay" onclick="closeModal(event)">
      <div class="modal">
        <div class="modal-logo">FLARE<span>(V)</span></div>
        <h3>사진 공유를 위해 로그인이 필요해요</h3>
        <button class="modal-btn">
          <img src="https://www.google.com/favicon.ico" width="18" /> 구글로
          계속하기
        </button>
        <button class="modal-btn"><span>🍎</span> 애플로 계속하기</button>
        <button class="modal-btn"><span>📧</span> 이메일로 계속하기</button>
        <button class="modal-cancel" onclick="closeModal()">취소</button>
      </div>
    </div>

    <!-- Supabase 라이브러리 -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
      // ============================================
      // Supabase 연결 설정
      // ============================================
      const SUPABASE_URL = 'https://pbrbzjxdjqqmhvhzhwlp.supabase.co';
      const SUPABASE_KEY =
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBicmJ6anhkanFxbWh2aHpod2xwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3Mjc3NTcsImV4cCI6MjA5NTMwMzc1N30.E6-GthxwIFN2-jy4ojf5ZxR7YcdPJULG6Mxj9LvkI1c';

      const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

      // ── 상태 변수 ──
      let festivalData = [];
      let map;
      let pinOverlays = []; // 핀 객체들 (필터링용)
      let currentLikes = 0;
      let liked = false;
      const LABEL_ZOOM = 11;

      // 필터 상태
      let activeCategories = { festival: true, discount: false, live: false };
      let dateFilter = 'today'; // today / tomorrow / week / month / custom / none
      let customRange = { start: null, end: null };
      let showUnknown = false; // 날짜 미정 축제 표시 여부

      // ── 구글 지도 다크 스타일 ──
      const darkStyle = [
        { elementType: 'geometry', stylers: [{ color: '#0d0d14' }] },
        { elementType: 'labels.text.fill', stylers: [{ color: '#6b6b80' }] },
        { elementType: 'labels.text.stroke', stylers: [{ color: '#0a0a0f' }] },
        {
          featureType: 'road',
          elementType: 'geometry',
          stylers: [{ color: '#1a1a2e' }],
        },
        {
          featureType: 'road',
          elementType: 'geometry.stroke',
          stylers: [{ color: '#212135' }],
        },
        {
          featureType: 'road.highway',
          elementType: 'geometry',
          stylers: [{ color: '#22223a' }],
        },
        {
          featureType: 'water',
          elementType: 'geometry',
          stylers: [{ color: '#070710' }],
        },
        {
          featureType: 'poi',
          elementType: 'labels',
          stylers: [{ visibility: 'off' }],
        },
        {
          featureType: 'poi',
          elementType: 'geometry',
          stylers: [{ color: '#111120' }],
        },
        {
          featureType: 'poi.park',
          elementType: 'geometry',
          stylers: [{ color: '#0e1a0e' }],
        },
        {
          featureType: 'transit',
          elementType: 'geometry',
          stylers: [{ color: '#141425' }],
        },
      ];

      // ── 지도 초기화 ──
      function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 36.5, lng: 127.8 },
          zoom: 7,
          styles: darkStyle,
          disableDefaultUI: true,
          gestureHandling: 'greedy', // 한 손가락 이동
          zoomControl: true,
          zoomControlOptions: {
            position: google.maps.ControlPosition.RIGHT_CENTER,
          },
        });

        if (festivalData.length > 0) showFestivalPins();
      }

      // ── 데이터 가져오기 ──
      async function loadFestivals() {
        document.getElementById('loading').style.display = 'block';

        const { data, error } = await supabaseClient
          .from('festivals')
          .select('*')
          .eq('is_active', true);

        document.getElementById('loading').style.display = 'none';

        if (error) {
          console.log('❌ 에러:', error.message);
          return;
        }

        festivalData = data;
        console.log('✅ 축제', data.length, '개 불러옴');
        document.getElementById('cnt-festival').textContent = data.length;

        if (map) showFestivalPins();
      }

      // ── 핀 표시 ──
      function showFestivalPins() {
        class FlarePin extends google.maps.OverlayView {
          constructor(festival) {
            super();
            this.festival = festival;
            this.position = new google.maps.LatLng(
              festival.latitude,
              festival.longitude
            );
            this.div = null;
            // 날짜 미확인 여부
            this.isUnknown = !festival.date_start;
          }

          onAdd() {
            const div = document.createElement('div');
            div.className = 'flare-pin' + (this.isUnknown ? ' unknown' : '');
            div.style.position = 'absolute';
            div.style.willChange = 'transform';
            div.innerHTML =
              '<div class="flare-dot"></div>' +
              '<div class="flare-label">' +
              (this.festival.title || '축제') +
              '</div>';

            div.addEventListener('click', (e) => {
              e.stopPropagation();
              openFestivalPanel(this.festival);
            });

            this.div = div;
            this.getPanes().overlayMouseTarget.appendChild(div);
          }

          draw() {
            if (!this.div) return;
            const point = this.getProjection().fromLatLngToDivPixel(
              this.position
            );
            if (point) {
              this.div.style.transform =
                'translate(' + (point.x - 7) + 'px,' + (point.y - 7) + 'px)';
            }
          }

          setZoomed(isZoomed) {
            if (!this.div) return;
            if (isZoomed) this.div.classList.add('zoomed');
            else this.div.classList.remove('zoomed');
          }

          // 화면에 보일지 숨길지
          setVisible(visible) {
            if (!this.div) return;
            this.div.style.display = visible ? 'block' : 'none';
          }

          onRemove() {
            if (this.div) {
              this.div.parentNode.removeChild(this.div);
              this.div = null;
            }
          }
        }

        festivalData.forEach((f) => {
          if (!f.latitude || !f.longitude) return;
          const pin = new FlarePin(f);
          pin.setMap(map);
          pinOverlays.push(pin);
        });

        updatePinLabels();
        applyFilters(); // 초기 필터 적용
        map.addListener('zoom_changed', updatePinLabels);
      }

      function updatePinLabels() {
        const zoomedIn = map.getZoom() >= LABEL_ZOOM;
        pinOverlays.forEach((pin) => pin.setZoomed(zoomedIn));
      }

      // ── 날짜 비교 도우미 ──
      function toDate(str) {
        if (!str) return null;
        return new Date(str + 'T00:00:00');
      }

      // 축제가 현재 날짜 필터에 맞는지
      function matchesDateFilter(f) {
        // 날짜 없는 축제는 별도 토글로 관리
        if (!f.date_start) return false;

        const start = toDate(f.date_start);
        const end = toDate(f.date_end) || start;

        const today = new Date();
        today.setHours(0, 0, 0, 0);

        let from, to;

        if (dateFilter === 'today') {
          from = new Date(today);
          to = new Date(today);
        } else if (dateFilter === 'tomorrow') {
          from = new Date(today);
          from.setDate(from.getDate() + 1);
          to = new Date(from);
        } else if (dateFilter === 'week') {
          from = new Date(today);
          to = new Date(today);
          to.setDate(to.getDate() + 7);
        } else if (dateFilter === 'month') {
          from = new Date(today);
          to = new Date(today);
          to.setMonth(to.getMonth() + 1);
        } else if (dateFilter === 'custom') {
          if (!customRange.start || !customRange.end) return true;
          from = toDate(customRange.start);
          to = toDate(customRange.end);
        } else {
          return true; // 필터 없음
        }

        // 축제 기간이 [from, to]와 겹치면 표시
        return start <= to && end >= from;
      }

      // ── 필터 적용 (핀 보이기/숨기기) ──
      function applyFilters() {
        let visibleCount = 0;

        pinOverlays.forEach((pin) => {
          const f = pin.festival;
          let show = true;

          // 1. 카테고리: 현재는 축제만 데이터 있음
          if (!activeCategories.festival) show = false;

          // 2. 날짜 미정 축제 처리
          if (pin.isUnknown) {
            show = showUnknown; // 토글에 따라
          } else {
            // 3. 날짜 필터
            if (show && !matchesDateFilter(f)) show = false;
          }

          pin.setVisible(show);
          if (show) visibleCount++;
        });

        document.getElementById('cnt-festival').textContent = visibleCount;
      }

      // ── 정보 패널 ──
      function openFestivalPanel(f) {
        const panel = document.getElementById('info-panel');

        document.getElementById('panel-img').textContent = '🎪';
        document.getElementById('panel-img').style.fontSize = '4rem';
        document.getElementById('panel-title').textContent =
          f.title || '제목 없음';
        document.getElementById('panel-date').textContent = f.date_start
          ? f.date_start + (f.date_end ? ' ~ ' + f.date_end : '')
          : '날짜 미정';
        document.getElementById('panel-loc').textContent =
          f.location_name || '장소 미정';
        document.getElementById('panel-time').textContent = f.address || '';

        currentLikes = 0;
        liked = false;
        document.getElementById('like-btn').className = 'reaction-btn';
        document.getElementById('like-count').textContent = currentLikes;

        // 애니메이션 재생을 위해 클래스 재적용
        panel.classList.remove('show');
        void panel.offsetWidth; // 리플로우 트릭
        panel.classList.add('show');
      }

      function closePanel() {
        document.getElementById('info-panel').classList.remove('show');
      }

      function toggleLike() {
        liked = !liked;
        currentLikes += liked ? 1 : -1;
        const btn = document.getElementById('like-btn');
        btn.className = liked ? 'reaction-btn liked' : 'reaction-btn';
        document.getElementById('like-count').textContent = currentLikes;
      }

      function openComment() {
        alert('댓글 기능은 곧 추가될 예정이에요! 😊');
      }

      // ── 날짜 버튼 ──
      function setDate(el, type) {
        document
          .querySelectorAll('.date-btn')
          .forEach((b) => b.classList.remove('active'));
        el.classList.add('active');
        dateFilter = type;

        // 기간 설정 입력칸 비우기 (버튼 선택 시)
        document.getElementById('range-start').value = '';
        document.getElementById('range-end').value = '';
        customRange = { start: null, end: null };

        applyFilters();
      }

      // ── 기간 직접 설정 ──
      function setCustomRange() {
        const s = document.getElementById('range-start').value;
        const e = document.getElementById('range-end').value;
        customRange.start = s || null;
        customRange.end = e || null;

        // 둘 다 입력되면 날짜 버튼 선택 해제
        if (s && e) {
          document
            .querySelectorAll('.date-btn')
            .forEach((b) => b.classList.remove('active'));
          dateFilter = 'custom';
        }

        applyFilters();
      }

      // ── 미정 축제 토글 ──
      function toggleUnknown() {
        showUnknown = !showUnknown;
        document
          .getElementById('unknown-toggle')
          .classList.toggle('active', showUnknown);
        applyFilters();
      }

      // ── 카테고리 토글 ──
      function toggleFilter(el, type) {
        const activeClass = 'active-' + type;
        if (el.classList.contains(activeClass)) {
          el.classList.remove(activeClass);
          activeCategories[type] = false;
        } else {
          el.classList.add(activeClass);
          activeCategories[type] = true;
        }
        applyFilters();
      }

      // ── 모바일 사이드바 ──
      function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
        document.getElementById('sidebar-overlay').classList.toggle('show');
      }
      function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-overlay').classList.remove('show');
      }

      // ── 모달 ──
      function openModal() {
        document.getElementById('modal-overlay').classList.add('show');
      }
      function closeModal(e) {
        if (!e || e.target === document.getElementById('modal-overlay')) {
          document.getElementById('modal-overlay').classList.remove('show');
        }
      }

      // ── 시작 ──
      loadFestivals();
    </script>

    <!-- 구글 지도 API -->
    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyB00WMTxhIKSr_rRXGjnK-wCABbvbkilPU&callback=initMap"
      async
      defer
    ></script>
  </body>
</html>
