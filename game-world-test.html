<!-- game-world-test.html  v2.0  |  Flare[V] 전세계 영유권 + 렉 측정 데모 -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>전세계 영유권 · 렉 테스트</title>
<style>
  :root{--bg:#0d1117;--panel:rgba(16,21,30,.88);--line:rgba(255,255,255,.10);--txt:#e8edf4;--dim:#8b97a8;--accent:#ffcc4d;--good:#4ade80;--bad:#f87171;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;color:var(--txt);background:var(--bg)}
  #map{position:absolute;inset:0}

  #panel{position:absolute;top:14px;left:14px;width:288px;max-width:calc(100vw - 28px);background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:16px;padding:16px;z-index:5;box-shadow:0 16px 50px rgba(0,0,0,.5)}
  #panel h1{margin:0;font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);font-weight:700}

  /* 렉 측정 미터 */
  #meter{display:flex;gap:8px;margin-top:12px}
  .stat{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:11px;padding:9px 8px;text-align:center}
  .stat .v{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1}
  .stat .k{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-top:4px}

  .ctrl{margin-top:14px}
  .ctrl .lab{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:6px;display:flex;justify-content:space-between}
  .ctrl .lab span{color:var(--txt);font-weight:700}
  .seg{display:flex;gap:6px}
  .seg button{flex:1;padding:8px 0;font-size:13px;font-weight:700;color:var(--txt);background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:9px;cursor:pointer;transition:.15s}
  .seg button:hover{background:rgba(255,255,255,.12)}
  .seg button.on{background:var(--accent);color:#1a1300;border-color:var(--accent)}
  .seg button:disabled{opacity:.4;cursor:wait}

  #lead{margin-top:14px;padding:11px 12px;border-radius:12px;background:rgba(255,204,77,.08);border:1px solid rgba(255,204,77,.25)}
  #lead .lab{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent)}
  #lead .who{display:flex;align-items:center;gap:8px;margin-top:5px;font-size:16px;font-weight:800}
  #lead .who .sw{width:13px;height:13px;border-radius:4px}
  #lead .sub{margin-top:3px;font-size:12px;color:var(--dim)}

  #hint{position:absolute;bottom:14px;left:14px;z-index:5;font-size:12px;color:var(--dim);background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 12px;backdrop-filter:blur(8px);max-width:calc(100vw - 28px)}
  #load{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;background:rgba(13,17,23,.92);border:1px solid var(--line);border-radius:14px;padding:18px 24px;font-size:14px;display:none}
  .iw{font-family:inherit;color:#1a2230;min-width:160px}
  .iw .t{font-size:15px;font-weight:800;margin-bottom:5px}
  .iw .l{display:flex;align-items:center;gap:7px;font-size:13px;margin:3px 0}
  .iw .sw{width:12px;height:12px;border-radius:3px}
  @media(max-width:520px){#panel{width:calc(100vw - 28px)}}
</style>
</head>
<body>
  <div id="map"></div>

  <div id="panel">
    <h1>전세계 영유권 · 렉 측정</h1>

    <div id="meter">
      <div class="stat"><div class="v" id="fps">–</div><div class="k">FPS</div></div>
      <div class="stat"><div class="v" id="regions">–</div><div class="k">구역 수</div></div>
      <div class="stat"><div class="v" id="rms">–</div><div class="k">적용 ms</div></div>
    </div>

    <div class="ctrl">
      <div class="lab">정밀도 (구역 수 · 렉의 진짜 원인) <span id="precName">저</span></div>
      <div class="seg" id="segPrec">
        <button data-p="low" class="on">저</button>
        <button data-p="mid">중</button>
        <button data-p="high">고 ⚠</button>
      </div>
    </div>

    <div class="ctrl">
      <div class="lab">플레이어 수 (FPS엔 영향 거의 없음) <span id="plyName">1만</span></div>
      <div class="seg" id="segPly">
        <button data-n="1000">1천</button>
        <button data-n="10000" class="on">1만</button>
        <button data-n="100000">10만</button>
      </div>
    </div>

    <div id="lead">
      <div class="lab">현재 최대 영유국</div>
      <div class="who"><span class="sw" id="leadSw"></span><span id="leadNm">집계 중…</span></div>
      <div class="sub" id="leadSub">데이터를 불러오는 중</div>
    </div>
  </div>

  <div id="hint">지도를 <b>드래그·확대/축소</b> 하면서 좌측 FPS를 보세요 · 정밀도 '고'는 40MB라 잠시 멈출 수 있어요</div>
  <div id="load">불러오는 중…</div>

<script>
const GOOGLE_MAPS_API_KEY = "AIzaSyB00WMTxhIKSr_rRXGjnK-wCABbvbkilPU";

const SRC = {
  low:  "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_1_states_provinces.geojson",
  mid:  "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_1_states_provinces.geojson",
  high: "https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_admin_1_states_provinces.geojson"
};
const PREC_LABEL = {low:"저", mid:"중", high:"고"};

let map, infoWindow, geo=null, numPlayers=10000, ownerCount={};
const cache = {};

function rng(seed){return function(){seed|=0;seed=(seed+0x6D2B79F5)|0;let t=Math.imul(seed^seed>>>15,1|seed);t=(t+Math.imul(t^t>>>7,61|t))^t;return((t^t>>>14)>>>0)/4294967296;};}
function playerColor(i){const h=(i*137.508)%360;const s=58+(i%4)*8;const l=48+(i%3)*7;return `hsl(${h.toFixed(1)},${s}%,${l}%)`;}

/* ── 실시간 FPS 미터 ── */
let frames=0, lastT=performance.now();
function fpsLoop(now){
  frames++;
  if(now-lastT>=500){
    const fps=Math.round(frames*1000/(now-lastT));
    const el=document.getElementById('fps');
    el.textContent=fps;
    el.style.color = fps>=50 ? 'var(--good)' : fps>=25 ? 'var(--accent)' : 'var(--bad)';
    frames=0; lastT=now;
  }
  requestAnimationFrame(fpsLoop);
}

function assign(){
  const rand=rng(7); ownerCount={};
  geo.features.forEach(f=>{
    const owner=Math.floor(rand()*numPlayers);
    const score=1000+Math.floor(rand()*9000);
    f.properties.__owner=owner; f.properties.__score=score; f.properties.__color=playerColor(owner);
    (ownerCount[owner]=ownerCount[owner]||{cnt:0,sum:0}).cnt++; ownerCount[owner].sum+=score;
  });
}

function paint(){
  const t0=performance.now();
  map.data.forEach(ft=>map.data.remove(ft));
  map.data.addGeoJson(geo);
  map.data.setStyle(f=>({fillColor:f.getProperty('__color'),fillOpacity:.6,strokeColor:'#0d1117',strokeWeight:.4}));
  document.getElementById('rms').textContent=Math.round(performance.now()-t0);
}

function board(){
  const r=Object.entries(ownerCount).map(([id,v])=>({id:+id,cnt:v.cnt,sum:v.sum})).sort((a,b)=>b.cnt-a.cnt||b.sum-a.sum);
  const top=r[0];
  document.getElementById('leadSw').style.background=playerColor(top.id);
  document.getElementById('leadNm').textContent=`플레이어 ${top.id+1}`;
  document.getElementById('leadSub').textContent=`${top.cnt}개 구역 · 누적 ${top.sum.toLocaleString()}점`;
  document.getElementById('regions').textContent=geo.features.length.toLocaleString();
}

async function loadPrec(p){
  const ld=document.getElementById('load');
  ld.style.display='block';
  ld.textContent = p==='high' ? '40MB 불러오는 중… 잠시 멈출 수 있어요' : '불러오는 중…';
  document.querySelectorAll('#segPrec button').forEach(b=>b.disabled=true);
  document.getElementById('precName').textContent=PREC_LABEL[p];
  try{
    if(!cache[p]) cache[p]=await (await fetch(SRC[p])).json();
    geo=JSON.parse(JSON.stringify(cache[p]));   // 매번 깨끗한 사본으로 색 다시 배정
    assign(); paint(); board();
  }catch(e){
    alert('데이터를 불러오지 못했어요: '+e.message);
  }finally{
    ld.style.display='none';
    document.querySelectorAll('#segPrec button').forEach(b=>b.disabled=false);
  }
}

function initMap(){
  map=new google.maps.Map(document.getElementById('map'),{
    center:{lat:25,lng:15}, zoom:3, minZoom:2, mapTypeControl:false, streetViewControl:false,
    backgroundColor:'#0d1117',
    styles:[{elementType:'geometry',stylers:[{color:'#1d2530'}]},
      {elementType:'labels',stylers:[{visibility:'off'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0f161f'}]}]
  });
  infoWindow=new google.maps.InfoWindow();
  map.data.addListener('mouseover',e=>map.data.overrideStyle(e.feature,{fillOpacity:.85}));
  map.data.addListener('mouseout',()=>map.data.revertStyle());
  map.data.addListener('click',e=>{
    const f=e.feature, o=f.getProperty('__owner');
    infoWindow.setContent(`<div class="iw"><div class="t">${f.getProperty('name')||'(이름 없음)'}</div>
      <div class="l"><span class="sw" style="background:${f.getProperty('__color')}"></span>플레이어 ${o+1}</div>
      <div class="l">점수 ${f.getProperty('__score').toLocaleString()} · 보유 ${ownerCount[o].cnt}곳</div></div>`);
    infoWindow.setPosition(e.latLng); infoWindow.open(map);
  });

  document.getElementById('segPrec').addEventListener('click',ev=>{
    const b=ev.target.closest('button'); if(!b||b.disabled)return;
    document.querySelectorAll('#segPrec button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); loadPrec(b.dataset.p);
  });
  document.getElementById('segPly').addEventListener('click',ev=>{
    const b=ev.target.closest('button'); if(!b)return;
    document.querySelectorAll('#segPly button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); numPlayers=+b.dataset.n;
    document.getElementById('plyName').textContent = numPlayers>=10000 ? (numPlayers/10000)+'만' : (numPlayers/1000)+'천';
    if(geo){ assign(); paint(); board(); }
  });

  requestAnimationFrame(fpsLoop);
  loadPrec('low');
}

window.initMap=initMap;
const s=document.createElement('script');
s.src=`https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&callback=initMap&language=ko`;
s.async=true; s.defer=true;
s.onerror=()=>alert('구글 지도를 불러오지 못했어요. 키 또는 도메인 설정을 확인해 주세요.');
document.head.appendChild(s);
</script>
</body>
</html>
